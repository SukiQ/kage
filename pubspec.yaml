name: kage
description: "Kage - A Claude Code-powered desktop IDE for code quality governance: scan, analyze, fix and verify across code quality, security, architecture, performance and testing."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # 本地存储
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  # 数据模型
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI / 字体（MiSans 本地字体资产，family: MiSans）

  # 桌面窗口（无边框自绘标题栏）
  window_manager: ^0.4.0

  # 工具
  logger: ^2.5.0
  uuid: ^4.5.1
  path: ^1.9.0
  collection: ^1.18.0

  # 文件系统
  watcher: ^1.1.0

  # Markdown 渲染
  flutter_markdown: ^0.7.4+1
  markdown: ^7.2.2

  # 图标（lucide）

  # SVG 渲染（标题栏 logo）
  flutter_svg: ^2.0.10+1

  # 文件选择（桌面端原生）
  file_picker: ^8.3.7
  lucide_icons_flutter: ^3.1.14+2
  dio: ^5.10.0
  markdown_widget: ^2.3.2+8
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

  # 代码生成
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  freezed: ^3.0.6
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/presets/
    - assets/presets/templates/
    - assets/images/

  fonts:
    - family: MiSans
      fonts:
        - asset: assets/fonts/MiSans-Regular.ttf
        - asset: assets/fonts/MiSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/MiSans-Semibold.ttf
          weight: 600
        - asset: assets/fonts/MiSans-Bold.ttf
          weight: 700

flutter_launcher_icons:
  image_path: "assets/images/logo.png"
  windows:
    generate: true
  macos:
    generate: true
